name: Deploy Frontend ECS
on:
  push:
    branches: [ "deploy" ]
env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configurar AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Definir variables
        run: |
          echo "FRONT_IMAGE=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${{ secrets.ECR_FRONTEND_REPO }}:${GITHUB_SHA}" >> $GITHUB_ENV
      
      - name: Build & Push Frontend
        run: |
          docker build -t $FRONT_IMAGE ./front_despacho
          docker push $FRONT_IMAGE

      - name: Render Deploy Frontend
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: front_despacho/frontend-task-definition.json
          container-name: frontend
          image: ${{ env.FRONT_IMAGE }}
        id: render-front
      - uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-front.outputs.task-definition }}
          service: ${{ secrets.ECS_FRONTEND_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
